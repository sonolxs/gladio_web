    <style>
      .casos-section {
        padding: 60px 40px;
        background: var(--bg-primary);
      }

      .casos-header {
        text-align: center;
        margin-bottom: 40px;
      }

      .casos-header h2 {
        font-size: 13px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--accent-color);
        margin-bottom: 10px;
      }

      .casos-header h1 {
        font-size: 32px;
        font-weight: 500;
        color: #fff;
      }

      .casos-header span {
        color: var(--brand-primary);
      }

      .filters {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
        margin-bottom: 40px;
      }

      .filter {
        position: relative;
      }

      .filter-label {
        display: block;
        padding: 8px 20px;
        border: 1px solid #333;
        color: #aaa;
        font-size: 12px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        cursor: pointer;
        background: transparent;
        transition: all 0.2s;
        white-space: nowrap;
      }

      .filter-label:hover {
        border-color: var(--accent-color);
        color: #fff;
      }

      .filter-label.active {
        border-color: var(--brand-primary);
        color: var(--brand-primary);
      }

      .filter-options {
        display: none;
        position: absolute;
        top: 100%;
        left: 0;
        background: #111;
        border: 1px solid #333;
        min-width: 160px;
        z-index: 10;
      }

      .filter-options div {
        padding: 10px 16px;
        font-size: 12px;
        color: #aaa;
        cursor: pointer;
        letter-spacing: 1px;
        text-transform: uppercase;
        transition: background 0.15s;
      }

      .filter-options div:hover {
        background: #1a1a1a;
        color: #fff;
      }

      .filter-options div.selected {
        color: var(--brand-primary);
      }

      .filter.open .filter-options {
        display: block;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 1px;
        background: #1a1a1a;
      }

      .card {
        background: #0d0d0d;
        overflow: hidden;
      }

      .card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 20px;
        border-bottom: 1px solid #1a1a1a;
      }

      .card-header h3 {
        font-size: 10px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--accent-color);
      }

      .card-header img {
        height: 24px;
        object-fit: contain;
        filter: brightness(0) invert(1);
        opacity: 0.6;
      }
/* .card-img {
  height: 200px; /* o el alto que tengas definido 
  overflow: hidden;
  position: relative;
      } */

.card-img video {
  width: 100%;
  height: 100%;
  object-fit: cover; /* cubre todo el espacio, recortando si es necesario */
}
      .card-img {
        width: 100%;
        height: 200px;
        overflow: hidden;
      }

      .card-img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: transform 0.4s;
      }

      .card:hover .card-img img {
        transform: scale(1.04);
      }

      .card-body {
        padding: 20px;
      }

      .card-client {
        font-size: 16px;
        font-weight: 500;
        color: #fff;
        margin-bottom: 4px;
      }

      .card-location {
        font-size: 11px;
        color: #555;
        letter-spacing: 1px;
        text-transform: uppercase;
        margin-bottom: 16px;
      }

      .card-field {
        margin-bottom: 12px;
      }

      .card-field-label {
        font-size: 10px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--brand-primary);
        margin-bottom: 4px;
      }

      .card-field-text {
        font-size: 13px;
        color: #aaa;
        line-height: 1.6;
      }

      .card-product {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 16px;
        padding-top: 16px;
        border-top: 1px solid #1a1a1a;
      }

      .card-product img {
        width: 32px;
        opacity: 0.7;
      }

      .card-product a {
        font-size: 12px;
        color: var(--client-color);
        letter-spacing: 1px;
        text-decoration: none;
        text-transform: uppercase;
      }

      .card-product a:hover {
        border-bottom: 1px solid var(--client-color);
      }

      .card-footer {
        padding: 14px 20px;
        border-top: 1px solid #1a1a1a;
      }

      .card-footer a {
        display: block;
        text-align: center;
        padding: 10px;
        border: 1px solid #333;
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #666;
        text-decoration: none;
        transition: all 0.2s;
      }

      .card-footer a:hover {
        border-color: #25d366;
        color: #25d366;
      }

      .pagination {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-top: 40px;
      }

      .pagination button {
        width: 36px;
        height: 36px;
        border: 1px solid #333;
        background: transparent;
        color: #666;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .pagination button:hover {
        border-color: #fff;
        color: #fff;
      }

      .pagination button.active {
        border-color: var(--brand-primary);
        color: var(--brand-primary);
      }

      .no-results {
        text-align: center;
        padding: 60px 20px;
        color: #444;
        font-size: 13px;
        letter-spacing: 2px;
        text-transform: uppercase;
        grid-column: 1/-1;
      }
    </style>

    <script>
      const data = [
        {
          marca: 'GILARDONI',
          vertical: 'INSPECCION',
          segmento: 'CEDIS',
           title: 'CENTROS DE DISTRIBUCIÓN',
            nombre: 'COCA COLA',
             ubicacion: 'Vallejo, Ciudad de México', 
             necesidad: 'Control Acceso a la planta industrial de Coca Cola para evitar la entrada de objetos peligrosos o no deseados.', 
             problema: 'La planta industrial de Coca Cola no cuenta con un sistema eficiente para controlar el acceso y evitar la entrada de objetos peligrosos o no deseados.', solucion: 'Se instaló un equipo de Rayos X con el fin de evitar el acceso de estos materiales y preservar la máxima seguridad en la planta.', producto: 'FEP ME 536', links: ['https://rseguridad.com/producto/maquina-de-rayos-x-argo-536/'], iconografia: ['https://rseguridad.com/wp-content/uploads/2023/04/maquina-rayos-x.png'], images: ['./src/vehicular.mp4'], logo: 'https://rseguridad.com/wp-content/uploads/2025/10/gilardoni.png', url: 'whatsapp://send?phone=525559519070&text=Hola,%20me%20gustaría%20saber%20más%20información%20acerca%20del%20FEP%20ME%20536%20instalado%20en%20CEDIS%20Coca%20Cola%20Vallejo%20que%20vi%20en%20la%20página%20web.'
        },
        { marca: 'CIAS', vertical: 'INTRUSION', segmento: 'RETAIL', title: 'RETAIL', nombre: 'Suburbia Tultitlan', ubicacion: 'Gustavo A. Madero, Ciudad de México', necesidad: 'Proteger portón de acceso por la parte trasera de la tienda y así evitar intrusiones.', problema: 'Evitar robos en bodega.', solucion: 'Antenas de microondas en portón.', producto: 'Murena Compact +', links: ['https://rseguridad.com/producto/radar-microondas-murena-compact-plus/'], iconografia: ['https://rseguridad.com/wp-content/uploads/2023/04/barreras-microondas.png'], images: ['./src/vehicular.mp4'], logo: 'https://rseguridad.com/wp-content/uploads/2025/02/cias.png', url: 'whatsapp://send?phone=525559519070&text=Hola' },
        { marca: 'BFT', vertical: 'ACCESO VEHICULAR', segmento: 'PRISIONES', title: 'CENTRO PENITENCIARIO', nombre: 'CENTRO PENITENCIARIO', ubicacion: 'Coatlán del Río, Morelos', necesidad: 'Delimitar perímetro del Cefereso.', problema: 'La falta de delimitación clara del perímetro del Cefereso representa un riesgo para la seguridad, permitiendo accesos no controlados.', solucion: 'Se instalaron 6 bolardos de la marca BFT en frente de la entrada principal del reclusorio.', producto: 'XPASS 330/1200 BODY L', links: ['https://rseguridad.com/producto/bolardo-antiterrorismo-k12-xpass-b-330-1200-l/'], iconografia: ['https://rseguridad.com/wp-content/uploads/2023/04/bolardo-1-150x150.png'], images: ['./src/vehicular.mp4'], logo: 'https://rseguridad.com/wp-content/uploads/elementor/thumbs/bft-1-r24wzclwmn5y6kzlj0queyj56v6e323bja6vfj19bk.png', url: 'whatsapp://send?phone=525559519070&text=Hola' },
        { marca: 'SAIMA', vertical: 'ACCESO PEATONAL', segmento: 'BANCA', title: 'BANCA', nombre: 'City Bunker', ubicacion: 'San Pedro Garza García, Nuevo León', necesidad: 'Sustituir 2 Esclusas ELE 2000 monobloque que tienen 23 años de uso por 2 nuevas Esclusas ELE 2000 armables.', problema: 'Una de las dos Esclusas comienza a tener problemas y, por temas de seguridad y su antigüedad, requieren ser sustituidas.', solucion: 'Cambio de 2 Esclusas ELE 2000 armables en color negro mate, a solicitud del Cliente.', producto: 'ELE 2000', links: ['https://rseguridad.com/producto/esclusa-ele-2000/'], iconografia: ['https://rseguridad.com/wp-content/uploads/2023/04/esclusa-1.png'], images: ['./src/vehicular.mp4'], logo: 'https://rseguridad.com/wp-content/uploads/2025/05/Logo-SAIMA.png', url: 'whatsapp://send?phone=525559519070&text=Hola' }
      ];

      let activeFilters = { marca: null, vertical: null, segmento: null };
      let currentPage = 1;
      const perPage = 6;

      function getUnique(key) { return [...new Set(data.map(d => d[key]))]; }

      function buildFilters() {
        document.querySelectorAll('.filter').forEach(f => {
          const type = f.dataset.type;
          const opts = f.querySelector('.filter-options');
          const label = f.querySelector('.filter-label');
          const defaultText = f.dataset.default;

          const all = document.createElement('div');
          all.textContent = 'Todas';
          all.classList.add('selected');
          all.addEventListener('click', () => {
            activeFilters[type] = null;
            opts.querySelectorAll('div').forEach(d => d.classList.remove('selected'));
            all.classList.add('selected');
            label.textContent = defaultText;
            label.classList.remove('active');
            f.classList.remove('open');
            currentPage = 1; renderGrid();
          });
          opts.appendChild(all);

          getUnique(type).forEach(val => {
            const d = document.createElement('div');
            d.textContent = val;
            d.addEventListener('click', () => {
              activeFilters[type] = val;
              opts.querySelectorAll('div').forEach(x => x.classList.remove('selected'));
              d.classList.add('selected');
              label.textContent = val;
              label.classList.add('active');
              f.classList.remove('open');
              currentPage = 1; renderGrid();
            });
            opts.appendChild(d);
          });

          label.addEventListener('click', () => {
            document.querySelectorAll('.filter').forEach(x => { if (x !== f) x.classList.remove('open'); });
            f.classList.toggle('open');
          });
        });

        document.addEventListener('click', e => {
          if (!e.target.closest('.filter')) {
            document.querySelectorAll('.filter').forEach(x => x.classList.remove('open'));
          }
        });
      }

      function renderGrid() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        let filtered = data.filter(item =>
          (!activeFilters.marca || item.marca === activeFilters.marca) &&
          (!activeFilters.vertical || item.vertical === activeFilters.vertical) &&
          (!activeFilters.segmento || item.segmento === activeFilters.segmento)
        );
        const total = Math.ceil(filtered.length / perPage);
        const page = filtered.slice((currentPage - 1) * perPage, currentPage * perPage);
        if (!page.length) {
          grid.innerHTML = '<div class="no-results">Sin resultados</div>';
          document.getElementById('pagination').innerHTML = '';
          return;
        }
        page.forEach(item => {
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
      <div class="card-header"><h3>${item.title}</h3><img src="${item.logo}" alt="${item.marca}"></div>
      <div class="card-img">
  <video 
    src="${item.images[0]}" 
    poster="" 
    muted 
    loop 
    playsinline
    onmouseenter="this.play()" 
    onmouseleave="this.pause(); this.currentTime = 0;"
  ></video>
</div>
      <div class="card-body">
        <div class="card-client">${item.nombre}</div>
        <div class="card-location">${item.ubicacion}</div>
        <div class="card-field"><div class="card-field-label">Necesidad</div><div class="card-field-text">${item.necesidad}</div></div>
        <div class="card-field"><div class="card-field-label">Solución</div><div class="card-field-text">${item.solucion}</div></div>
        <div class="card-product"><img src="${item.iconografia[0]}" alt="producto"><a  target="_blank">${item.producto}</a></div>
      </div>
      <div class="card-footer"><a href="${item.url}">Solicitar información</a></div>
    `;
          grid.appendChild(card);
        });
        renderPagination(total);
      }

      function renderPagination(total) {
        const p = document.getElementById('pagination');
        p.innerHTML = '';
        if (total <= 1) return;
        for (let i = 1; i <= total; i++) {
          const btn = document.createElement('button');
          btn.textContent = i;
          if (i === currentPage) btn.classList.add('active');
          btn.addEventListener('click', () => { currentPage = i; renderGrid(); });
          p.appendChild(btn);
        }
      }

      buildFilters();
      renderGrid();
    </script>
